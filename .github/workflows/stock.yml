name: Stock Analysis

on:
  schedule:
    # 每天 UTC 时间 14:30 运行，即北京时间 22:30 (需考虑夏令时)
    - cron: '30 14 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  run-stock-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'  # 请根据项目实际要求调整

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run analysis script
        # 请根据项目的实际入口文件修改
        run: basic_data_daily_job.py
